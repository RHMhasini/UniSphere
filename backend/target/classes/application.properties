spring.application.name=UniSphere-Smart-Campus-API

# MongoDB Configuration
# Hide Atlas credentials by using MONGODB_URI from the env file or environment.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/SmartCampusDB}
spring.data.mongodb.database=SmartCampusDB

# Server Configuration
server.port=8081

# Logging
logging.level.org.springframework.data.mongodb=INFO
logging.level.com.unisphere=DEBUG

# CORS (handled programmatically)
