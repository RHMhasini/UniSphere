spring.application.name=backend

# MongoDB Configuration
# Load optional local env file (kept out of git via `.gitignore`)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Set this in your environment (recommended) or in a local `.env` file:
#   MONGODB_URI=mongodb+srv://<username>:<password>@universitybooking.swmmc2e.mongodb.net/university-booking?retryWrites=true&w=majority
# Default to a local dev MongoDB URI so the app (and tests) can boot without env vars.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/unisphere}
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/unisphere}

# Keep frontend default aligned (frontend/src/services/ticketingApi.js).
server.port=8080

# Demo seed data (creates collections + sample docs on first run if DB is empty)
app.seed.enabled=true
